<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HALT Go — Settings</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface-hover: #1c2a4a;
      --surface-light: #1e2d50;
      --accent: #e8a0bf;
      --accent-dim: #c47a9a;
      --text: #eee;
      --text-muted: #999;
      --text-body: #ccc;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
      --info: #60a5fa;
      --border-radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ============================================================
       Header
       ============================================================ */
    .header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent-dim);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .header h1 {
      font-size: 1.4rem;
      color: var(--accent);
      cursor: pointer;
    }

    .header h1 span { color: var(--text); font-weight: 400; }

    /* Navigation */
    .nav {
      display: flex;
      gap: 0.25rem;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-btn:hover { background: var(--surface-hover); color: var(--text); }
    .nav-btn.active { background: var(--accent-dim); color: white; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .user-info img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .user-info .username { color: var(--text-muted); font-size: 0.9rem; }

    /* ============================================================
       Buttons
       ============================================================ */
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-login {
      background: #5865F2;
      color: white;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 10px;
    }

    .btn-login:hover { background: #4752C4; }

    .btn-logout {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid #444;
    }

    .btn-logout:hover { color: var(--danger); border-color: var(--danger); }

    .btn-upload {
      background: var(--accent);
      color: #1a1a2e;
    }

    .btn-upload:hover { background: var(--accent-dim); color: white; }

    .btn-reset {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid #444;
      font-size: 0.8rem;
    }

    .btn-reset:hover { color: var(--danger); border-color: var(--danger); }

    /* ============================================================
       Login Screen
       ============================================================ */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 1.5rem;
      text-align: center;
    }

    .login-screen h2 { font-size: 2rem; color: var(--accent); }
    .login-screen p { color: var(--text-muted); max-width: 400px; line-height: 1.6; }

    .error-banner {
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      max-width: 500px;
    }

    /* ============================================================
       Page Container
       ============================================================ */
    .page {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 2rem 4rem;
    }

    .page h2 {
      font-size: 1.5rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .page h3 {
      font-size: 1.15rem;
      color: var(--accent);
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #2a2a4a;
    }

    .page h4 {
      font-size: 1rem;
      color: var(--text);
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .page p, .page li {
      color: var(--text-body);
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .page p { margin-bottom: 1rem; }

    .page ul, .page ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }

    .page li { margin-bottom: 0.4rem; }

    .page p.subtitle {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    /* ============================================================
       Content Cards / Panels
       ============================================================ */
    .panel {
      background: var(--surface);
      border-radius: var(--border-radius);
      padding: 1.25rem 1.5rem;
      border: 1px solid #2a2a4a;
      margin-bottom: 1rem;
    }

    .panel-accent {
      border-left: 3px solid var(--accent);
    }

    .panel-info {
      border-left: 3px solid var(--info);
    }

    .panel-warning {
      border-left: 3px solid var(--warning);
    }

    .panel h4 {
      margin-top: 0;
      color: var(--accent);
    }

    .panel p:last-child { margin-bottom: 0; }

    /* ============================================================
       Tables
       ============================================================ */
    .styled-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .styled-table th {
      background: var(--surface);
      color: var(--accent);
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 2px solid var(--accent-dim);
      font-weight: 600;
    }

    .styled-table td {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid #2a2a4a;
      color: var(--text-body);
    }

    .styled-table tr:hover td {
      background: var(--surface-hover);
    }

    .styled-table .emoji-cell {
      font-size: 1.3rem;
      width: 40px;
      text-align: center;
    }

    /* ============================================================
       Code Blocks
       ============================================================ */
    .code-block {
      background: #0d1117;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.85rem;
      color: #c9d1d9;
      overflow-x: auto;
      margin-bottom: 1rem;
      line-height: 1.6;
      white-space: pre;
    }

    .code-inline {
      background: #0d1117;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.85rem;
      color: #c9d1d9;
    }

    /* ============================================================
       Steps List
       ============================================================ */
    .steps {
      counter-reset: step;
      list-style: none;
      padding-left: 0;
    }

    .steps li {
      counter-increment: step;
      position: relative;
      padding-left: 3rem;
      margin-bottom: 1.25rem;
    }

    .steps li::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 0;
      width: 2rem;
      height: 2rem;
      background: var(--accent-dim);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
    }

    /* ============================================================
       Card Grid (Card Manager)
       ============================================================ */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .card-item {
      background: var(--surface);
      border-radius: var(--border-radius);
      padding: 1.25rem;
      border: 1px solid #2a2a4a;
      transition: border-color 0.2s;
    }

    .card-item:hover { border-color: var(--accent-dim); }

    .card-item-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .card-item-header .emoji { font-size: 1.5rem; }

    .card-item-header .info h3 {
      font-size: 1rem;
      color: var(--text);
      margin: 0;
      border: none;
      padding: 0;
    }

    .card-item-header .info p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin: 0;
    }

    .card-images {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      align-items: flex-start;
    }

    .card-preview { text-align: center; }

    .card-preview label {
      display: block;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-preview img {
      width: 120px;
      height: auto;
      border-radius: 8px;
      border: 2px solid #2a2a4a;
      transition: border-color 0.2s;
    }

    .card-preview img.active { border-color: var(--success); }
    .card-preview img.custom { border-color: var(--accent); }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-actions input[type="file"] { display: none; }

    .card-status {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      margin-left: auto;
    }

    .card-status.default {
      background: rgba(148, 163, 184, 0.15);
      color: #94a3b8;
    }

    .card-status.custom-badge {
      background: rgba(232, 160, 191, 0.15);
      color: var(--accent);
    }

    /* ============================================================
       Toast
       ============================================================ */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--success); color: #1a1a2e; }
    .toast.error { background: var(--danger); color: white; }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .loading-overlay.show { display: flex; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================================
       Footer
       ============================================================ */
    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .footer a { color: var(--accent-dim); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ============================================================
       Responsive
       ============================================================ */
    @media (max-width: 768px) {
      .header { padding: 0.5rem 1rem; flex-wrap: wrap; gap: 0.5rem; }
      .header-left { gap: 1rem; }
      .nav-btn { padding: 0.4rem 0.6rem; font-size: 0.8rem; }
      .page { padding: 0 1rem 3rem; }
      .card-grid { grid-template-columns: 1fr; }
      .card-images { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1 onclick="navigate('gameplay')">HALT Go</h1>
      <nav class="nav" id="nav"></nav>
    </div>
    <div id="header-right"></div>
  </div>

  <div id="app"></div>

  <div class="toast" id="toast"></div>
  <div class="loading-overlay" id="loading"><div class="spinner"></div></div>

  <div class="footer">
    <a href="https://helpingalllittlethings.org" target="_blank">Helping All Little Things</a>
    &nbsp;&middot;&nbsp;
    <a href="https://github.com/AlannaBurke/halt-discord-game" target="_blank">GitHub</a>
    &nbsp;&middot;&nbsp;
    <a href="https://github.com/AlannaBurke/halt-discord-game/issues" target="_blank">Report an Issue</a>
  </div>

  <script>
    // ============================================================
    // State
    // ============================================================
    let currentUser = null;
    let cards = [];
    let currentPage = 'gameplay';

    // ============================================================
    // Init
    // ============================================================
    async function init() {
      const errorMap = {
        no_code: 'Discord login failed — no authorization code received.',
        token_failed: 'Discord login failed — could not exchange token.',
        not_in_guild: 'You are not a member of the required Discord server.',
        no_role: 'You do not have the required admin role to access settings.',
        auth_failed: 'Discord authentication failed. Please try again.',
      };

      const params = new URLSearchParams(window.location.search);
      const error = params.get('error');
      const page = params.get('page');

      if (error) {
        window.history.replaceState({}, '', '/');
      }

      if (page) {
        currentPage = page;
      }

      try {
        const res = await fetch('/api/auth');
        const data = await res.json();

        if (data.authenticated) {
          currentUser = data.user;
          renderHeader();
          renderNav();
          await loadCards();
          navigate(currentPage);
        } else {
          renderLogin(error ? errorMap[error] || 'An error occurred.' : null);
        }
      } catch (e) {
        renderLogin('Could not connect to the server.');
      }
    }

    // ============================================================
    // Navigation
    // ============================================================
    function navigate(page) {
      currentPage = page;
      window.history.replaceState({}, '', `/?page=${page}`);
      updateNavActive();

      switch (page) {
        case 'gameplay': renderGameplayPage(); break;
        case 'cards': renderCardsPage(); break;
        case 'setup': renderSetupPage(); break;
        default: renderGameplayPage();
      }
    }

    function renderNav() {
      const nav = document.getElementById('nav');
      nav.innerHTML = `
        <button class="nav-btn" data-page="gameplay" onclick="navigate('gameplay')">How to Play</button>
        <button class="nav-btn" data-page="cards" onclick="navigate('cards')">Card Manager</button>
        <button class="nav-btn" data-page="setup" onclick="navigate('setup')">Setup Guide</button>
      `;
      updateNavActive();
    }

    function updateNavActive() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === currentPage);
      });
    }

    // ============================================================
    // Header
    // ============================================================
    function renderHeader() {
      const el = document.getElementById('header-right');
      if (currentUser) {
        el.innerHTML = `
          <div class="user-info">
            ${currentUser.avatar ? `<img src="${currentUser.avatar}" alt="">` : ''}
            <span class="username">${currentUser.globalName}</span>
            <a href="/auth/logout" class="btn btn-logout">Logout</a>
          </div>
        `;
      } else {
        el.innerHTML = '';
      }
    }

    function renderLogin(error) {
      document.getElementById('nav').innerHTML = '';
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="login-screen">
          <h2>HALT Go</h2>
          <p>A simultaneous multiplayer card drafting Discord game with adorable rescue animals. Login with Discord to access the dashboard.</p>
          ${error ? `<div class="error-banner">${error}</div>` : ''}
          <a href="/auth/login" class="btn btn-login">Login with Discord</a>
        </div>
      `;
    }

    // ============================================================
    // Page: How to Play
    // ============================================================
    function renderGameplayPage() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="page">
          <h2>How to Play HALT Go</h2>
          <p>HALT Go is a simultaneous multiplayer card drafting game played through Discord, inspired by
          <a href="https://youtu.be/-WO1cP9wzrw" target="_blank" style="color: var(--accent);">Sushi Go</a>.
          Players draft adorable rescue animal cards over multiple rounds, building the best collection for the highest score.</p>

          <h3>Overview</h3>
          <p>Each game consists of <strong>3 rounds</strong>, and each round has <strong>7 phases</strong>.
          In every phase, all players simultaneously choose one card from their available options.
          The number of cards to choose from shrinks each phase (starting at 8, ending at 2).
          After each round, scores are calculated and cards are cleared. After all 3 rounds,
          final end-game bonuses are applied and the player with the highest total score wins.</p>

          <h3>Starting a Game</h3>
          <ol class="steps">
            <li>Use the <span class="code-inline">/game</span> slash command in any channel where the bot is active to create a game lobby.</li>
            <li>Other players click the <strong>Join Game</strong> button to join the lobby (2-10 players).</li>
            <li>Optionally, the host can toggle the <strong>Computer Player</strong> button to add HALTbot, a computer opponent that picks cards randomly. This is great for testing or solo play.</li>
            <li>When everyone is ready, the host clicks <strong>Start Game</strong> to begin.</li>
          </ol>

          <h3>Playing a Phase</h3>
          <p>Each phase works like this:</p>
          <ol>
            <li>The bot announces the current round and phase in the game channel.</li>
            <li>Each player receives a <strong>DM (Direct Message)</strong> from the bot showing their available cards as images.</li>
            <li>Players click a button to select the card they want to keep.</li>
            <li>You have <strong>60 seconds</strong> to make your choice. If time runs out, a random card is selected for you.</li>
            <li>Once all players have chosen, the next phase begins.</li>
          </ol>

          <div class="panel panel-info">
            <h4>Tip: Enable DMs</h4>
            <p>Make sure you have DMs enabled for the server. Go to <strong>Server Settings > Privacy Settings</strong> and enable "Direct Messages from server members." The bot sends your card choices via DM to keep them secret from other players.</p>
          </div>

          <h3>Phase Structure</h3>
          <p>Each round has 7 phases. The number of cards you can choose from decreases each phase:</p>

          <table class="styled-table">
            <thead>
              <tr><th>Phase</th><th>Cards Available</th><th>Strategy Note</th></tr>
            </thead>
            <tbody>
              <tr><td>1</td><td>8 cards</td><td>Maximum choice — set your strategy early</td></tr>
              <tr><td>2</td><td>7 cards</td><td>Still plenty of options</td></tr>
              <tr><td>3</td><td>6 cards</td><td>Start committing to combos</td></tr>
              <tr><td>4</td><td>5 cards</td><td>Mid-round pivot point</td></tr>
              <tr><td>5</td><td>4 cards</td><td>Options narrowing</td></tr>
              <tr><td>6</td><td>3 cards</td><td>Take what you can get</td></tr>
              <tr><td>7</td><td>2 cards</td><td>Final pick of the round</td></tr>
            </tbody>
          </table>

          <h3>Card Types &amp; Scoring</h3>
          <p>There are 9 different card types, each with unique scoring mechanics. Understanding how they work is key to winning.</p>

          <table class="styled-table">
            <thead>
              <tr><th></th><th>Card</th><th>How It Scores</th><th>Strategy</th></tr>
            </thead>
            <tbody>
              <tr>
                <td class="emoji-cell">&#x1f400;</td>
                <td><strong>Rat</strong></td>
                <td>Scaling set: 1=1, 2=3, 3=6, 4=10, 5+=15 pts</td>
                <td>High reward for collecting many, but diminishing returns after 5</td>
              </tr>
              <tr>
                <td class="emoji-cell">&#x1f439;</td>
                <td><strong>Gerbil</strong></td>
                <td>Majority: Most=+6, 2nd most=+3 pts</td>
                <td>Compete with other players for the most gerbils</td>
              </tr>
              <tr>
                <td class="emoji-cell">&#x1f930;</td>
                <td><strong>Pregnant Hamster</strong></td>
                <td>Swap for 2 new random cards</td>
                <td>Gamble for better cards — you lose this card but gain 2 new ones</td>
              </tr>
              <tr>
                <td class="emoji-cell">&#x1f33e;</td>
                <td><strong>Hay</strong></td>
                <td>Triples the value of the next Guinea Pig, Rabbit, or Chinchilla</td>
                <td>Powerful multiplier — pick Hay before a high-value animal</td>
              </tr>
              <tr>
                <td class="emoji-cell">&#x1f439;</td>
                <td><strong>Guinea Pig</strong></td>
                <td>3 points each (9 with Hay)</td>
                <td>Reliable points, excellent Hay target</td>
              </tr>
              <tr>
                <td class="emoji-cell">&#x1f430;</td>
                <td><strong>Rabbit</strong></td>
                <td>2 points each (6 with Hay)</td>
                <td>Solid mid-tier value</td>
              </tr>
              <tr>
                <td class="emoji-cell">&#x1f42d;</td>
                <td><strong>Chinchilla</strong></td>
                <td>1 point each (3 with Hay)</td>
                <td>Low value alone, but common and boosted by Hay</td>
              </tr>
              <tr>
                <td class="emoji-cell">&#x1f43f;&#xfe0f;</td>
                <td><strong>Degu</strong></td>
                <td>Set of 3 = 10 pts, otherwise 0</td>
                <td>All-or-nothing — commit to collecting 3 or skip entirely</td>
              </tr>
              <tr>
                <td class="emoji-cell">&#x1f431;</td>
                <td><strong>Sanctuary Cat</strong></td>
                <td>End-game: Most cats=+6, Least cats=-6</td>
                <td>Scored after all 3 rounds. Avoid having the fewest!</td>
              </tr>
            </tbody>
          </table>

          <h3>Scoring</h3>
          <h4>After Each Round</h4>
          <p>At the end of each round, the following scores are calculated from the cards you collected that round:</p>
          <ul>
            <li><strong>Flat-value cards</strong> (Guinea Pig, Rabbit, Chinchilla) score their base points</li>
            <li><strong>Hay multipliers</strong> are applied to the next eligible card in your collection</li>
            <li><strong>Rat sets</strong> are scored based on how many you collected</li>
            <li><strong>Gerbil majority</strong> is compared across all players</li>
            <li><strong>Degu sets</strong> are checked (need exactly 3 for points)</li>
          </ul>

          <h4>After the Final Round</h4>
          <p><strong>Sanctuary Cat</strong> bonuses are applied across all 3 rounds combined:</p>
          <ul>
            <li>The player with the <strong>most</strong> Sanctuary Cats across all rounds gets <strong>+6 points</strong></li>
            <li>The player with the <strong>fewest</strong> Sanctuary Cats gets <strong>-6 points</strong></li>
            <li>If there is a tie for most or fewest, the bonus/penalty is split</li>
          </ul>

          <h3>Collectible Gallery</h3>
          <p>At the end of the game, every player receives a personalized <strong>collection gallery</strong> image showing all the cards they collected across all 3 rounds, along with their final score. This gallery is posted in the game channel and also sent as a DM so you can save it.</p>

          <h3>Other Commands</h3>
          <table class="styled-table">
            <thead>
              <tr><th>Command</th><th>Description</th></tr>
            </thead>
            <tbody>
              <tr><td><span class="code-inline">/game</span></td><td>Create a new game lobby in the current channel</td></tr>
              <tr><td><span class="code-inline">/help</span></td><td>View the rules and card descriptions in Discord</td></tr>
              <tr><td><span class="code-inline">/status</span></td><td>Check the status of the current game in the channel</td></tr>
            </tbody>
          </table>

          <h3>Tips for New Players</h3>
          <div class="panel panel-accent">
            <ul>
              <li><strong>Watch the Gerbils</strong> — If no one else is collecting them, the majority bonus is easy points.</li>
              <li><strong>Hay + Guinea Pig = 9 points</strong> — The best Hay combo. Prioritize it when you see both.</li>
              <li><strong>Commit to Degu or skip them</strong> — Having 1 or 2 Degu is worth nothing. Only go for them if you can get 3.</li>
              <li><strong>Don't ignore Sanctuary Cats</strong> — Having the fewest costs you 6 points. Pick at least a couple across the game.</li>
              <li><strong>Pregnant Hamster is a gamble</strong> — You trade 1 known card for 2 random ones. Great early in a round, risky late.</li>
              <li><strong>Rats cap at 5</strong> — Collecting more than 5 rats doesn't give extra points (still 15).</li>
            </ul>
          </div>
        </div>
      `;
    }

    // ============================================================
    // Page: Card Manager
    // ============================================================
    function renderCardsPage() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="page">
          <h2>Card Image Manager</h2>
          <p class="subtitle">Upload custom images for any card. When you upload a new image, the Discord-sized card is automatically regenerated with the frame, title, and scoring text. Changes take effect immediately in the next game.</p>
          <div class="card-grid" id="card-grid"></div>
        </div>
      `;

      const grid = document.getElementById('card-grid');
      for (const card of cards) {
        grid.appendChild(createCardElement(card));
      }
    }

    function createCardElement(card) {
      const el = document.createElement('div');
      el.className = 'card-item';
      el.id = `card-${card.id}`;

      const customSrc = card.hasCustomImage
        ? `${card.customImage}?t=${Date.now()}`
        : null;

      el.innerHTML = `
        <div class="card-item-header">
          <span class="emoji">${card.emoji}</span>
          <div class="info">
            <h3>${card.name}</h3>
            <p>${card.description}</p>
          </div>
        </div>
        <div class="card-images">
          <div class="card-preview">
            <label>Discord Card</label>
            <img src="${card.discordImage}?t=${Date.now()}" alt="${card.name} Discord card" class="active">
          </div>
          <div class="card-preview">
            <label>Original Art</label>
            <img src="${card.originalImage}" alt="${card.name} original">
          </div>
          ${customSrc ? `
          <div class="card-preview">
            <label>Custom Art</label>
            <img src="${customSrc}" alt="${card.name} custom" class="custom">
          </div>
          ` : ''}
        </div>
        <div class="card-actions">
          <input type="file" id="file-${card.id}" accept="image/*" onchange="uploadCard('${card.id}', this)">
          <button class="btn btn-upload" onclick="document.getElementById('file-${card.id}').click()">
            Upload Image
          </button>
          ${card.hasCustomImage ? `
            <button class="btn btn-reset" onclick="resetCard('${card.id}')">
              Reset to Default
            </button>
            <span class="card-status custom-badge">Custom</span>
          ` : `
            <span class="card-status default">Default</span>
          `}
        </div>
      `;

      return el;
    }

            <li>Go to the <strong>Bot</strong> tab. Click <strong>Reset Token</strong> and copy the token — this is your <span class="code-inline">DISCORD_TOKEN</span>. Save it somewhere safe; you cannot view it again.</li>

    // ============================================================
    // API Functions
    // ============================================================
    async function loadCards() {
      try {
        const res = await fetch('/api/cards');
        const data = await res.json();
        cards = data.cards;
      } catch (e) {
        cards = [];
      }
    }

    async function uploadCard(cardId, input) {
      if (!input.files || !input.files[0]) return;

      const file = input.files[0];
      if (file.size > 5 * 1024 * 1024) {
        showToast('Image must be under 5MB', 'error');
        return;
      }

      showLoading(true);

      try {
        const formData = new FormData();
        formData.append('image', file);

        const res = await fetch(`/api/cards/${cardId}/upload`, {
          method: 'POST',
          body: formData,
        });

        const data = await res.json();

        if (data.success) {
          showToast(data.message, 'success');
          await loadCards();
          renderCardsPage();
        } else {
          showToast(data.error || 'Upload failed', 'error');
        }
      } catch (e) {
        showToast('Upload failed — check console for details', 'error');
        console.error(e);
      } finally {
        showLoading(false);
        input.value = '';
      }
    }

    async function resetCard(cardId) {
      if (!confirm('Reset this card to the default image?')) return;

      showLoading(true);

      try {
        const res = await fetch(`/api/cards/${cardId}/reset`, {
          method: 'POST',
        });

        const data = await res.json();

        if (data.success) {
          showToast(data.message, 'success');
          await loadCards();
          renderCardsPage();
        } else {
          showToast(data.error || 'Reset failed', 'error');
        }
      } catch (e) {
        showToast('Reset failed', 'error');
        console.error(e);
      } finally {
        showLoading(false);
      }
    }

    // ============================================================
    // UI Helpers
    // ============================================================
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('show', show);
    }

    // ============================================================
    // Start
    // ============================================================
    init();
  </script>
